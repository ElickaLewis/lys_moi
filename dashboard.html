<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Lys Moi</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background:
                linear-gradient(rgba(10, 10, 15, 0.65), rgba(10, 10, 15, 0.78)),
                url("images/background.png");
            background-size: cover;
            background-position: right center;
            background-repeat: no-repeat;
            color: #f5f1e8;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            text-align: center;
            background: rgba(20, 20, 25, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 28px;
            padding: 50px 35px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        .top {
            font-size: 13px;
            letter-spacing: 3px;
            color: #c9b08a;
            margin-bottom: 18px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0 0 16px;
            color: #fff8ee;
        }

        .subtitle {
            font-size: 1.15rem;
            color: #ddd3c4;
            margin-bottom: 35px;
        }

        .role-box {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .role-title {
            font-size: 1rem;
            color: #c9b08a;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .role-text {
            font-size: 1.2rem;
            color: #fff8ee;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
        }

        .primary {
            background: #f0c674;
            color: #1a1620;
            border: none;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(240, 198, 116, 0.25);
        }

        .secondary {
            background: transparent;
            color: #f5f1e8;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            opacity: 0.96;
        }

        .primary:hover {
            box-shadow: 0 15px 35px rgba(240, 198, 116, 0.4);
        }

        @media (max-width: 700px) {
            h1 {
                font-size: 2.2rem;
            }

            .buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top">Lys Moi</div>

        <h1 id="welcome-title">Bienvenue 🎉</h1>
        <p class="subtitle">Votre espace personnel sur Lys Moi.</p>

        <div class="role-box">
            <div class="role-title">Statut du compte</div>
            <div class="role-text" id="role-text">Chargement...</div>
        </div>

        <div class="buttons">
            <button class="primary" onclick="goHome()">Accueil</button>
            <button class="secondary" onclick="logout()">Se déconnecter</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://infljnmssewkeayrvtwc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_YI-ATv9K4m3ftejOIZpnQQ_kn4mMdP9";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadUser() {
            const { data, error } = await supabaseClient.auth.getUser();

            if (error || !data.user) {
                window.location.href = "login.html";
                return;
            }

            const user = data.user;
            const pseudo = user.user_metadata?.pseudo || "utilisateur";
            const role = user.user_metadata?.role || "reader";

            document.getElementById("welcome-title").textContent = `Bienvenue ${pseudo} 🎉`;

            if (role === "writer") {
                document.getElementById("role-text").textContent = "Connecté en tant qu’Écrivain ✍️";
            } else {
                document.getElementById("role-text").textContent = "Connecté en tant que Lecteur 👀";
            }
        }

        function goHome() {
            window.location.href = "index.html";
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        loadUser();
    </script>

</body>
</html>
