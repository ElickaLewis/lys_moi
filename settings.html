<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres - Lys Moi</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background:
                linear-gradient(rgba(10, 10, 15, 0.65), rgba(10, 10, 15, 0.78)),
                url("images/background.png");
            background-size: cover;
            background-position: right center;
            background-repeat: no-repeat;
            color: #f5f1e8;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            padding-top: 110px;
        }

        .main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: rgba(20, 20, 25, 0.75);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1000;
        }

        .logo {
            font-size: 1.3rem;
            letter-spacing: 2px;
            color: #f0c674;
            cursor: pointer;
            font-weight: bold;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-btn {
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            cursor: pointer;
            background: transparent;
            color: #f5f1e8;
            border: 1px solid rgba(255,255,255,0.25);
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .header-btn:hover {
            transform: translateY(-2px);
            opacity: 0.96;
        }

        .profile-btn {
            background: rgba(20, 20, 25, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .profile-menu-wrapper {
            position: relative;
        }

        .profile-trigger {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            background: rgba(255,255,255,0.08);
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            min-width: 220px;
            background: rgba(20, 20, 25, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 16px;
            padding: 10px;
            backdrop-filter: blur(12px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
            display: none;
            z-index: 2000;
        }

        .dropdown-menu.open {
            display: block;
        }

        .dropdown-item {
            width: 100%;
            background: transparent;
            border: none;
            color: #f5f1e8;
            text-align: left;
            padding: 12px 14px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(2px);
        }

        .dropdown-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 8px 0;
        }

        .container {
            width: 100%;
            max-width: 760px;
            background: rgba(20, 20, 25, 0.68);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 28px;
            padding: 45px 35px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        h1 {
            font-size: 2.6rem;
            margin: 0 0 12px;
            color: #fff8ee;
        }

        .subtitle {
            color: #ddd3c4;
            line-height: 1.7;
            font-size: 1.05rem;
            max-width: 560px;
            margin: 0 auto 28px;
        }

        .placeholder-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 24px;
            color: #f5f1e8;
        }

        .buttons {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        .primary {
            background: #f0c674;
            color: #1a1620;
            border: none;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(240, 198, 116, 0.25);
            padding: 14px 24px;
            border-radius: 14px;
            cursor: pointer;
        }

        .primary:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <header class="main-header">
        <span class="logo" onclick="goHome()">Lys Moi</span>
        <div class="header-right" id="header-right"></div>
    </header>

    <div class="container">
        <h1>Paramètres ⚙️</h1>
        <p class="subtitle">
            Cette page servira à personnaliser l’expérience utilisateur :
            thème, lecture, notifications, préférences auteur/lecteur, et plus encore.
        </p>

        <div class="placeholder-box">
            Les vrais réglages arrivent bientôt.
        </div>

        <div class="buttons">
            <button class="primary" onclick="goDashboard()">← Retour au dashboard</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://infljnmssewkeayrvtwc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_YI-ATv9K4m3ftejOIZpnQQ_kn4mMdP9";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function goHome() { window.location.href = "index.html"; }
        function goLogin() { window.location.href = "login.html"; }
        function goSignup() { window.location.href = "signup.html"; }
        function goDashboard() { window.location.href = "dashboard.html"; }
        function goWriterProfile() { window.location.href = "writer-profile.html"; }
        function goSettings() { window.location.href = "settings.html"; }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        function setupProfileDropdown() {
            const trigger = document.getElementById("profile-menu-trigger");
            const dropdown = document.getElementById("profile-dropdown");
            if (!trigger || !dropdown) return;

            trigger.addEventListener("click", function (event) {
                event.stopPropagation();
                dropdown.classList.toggle("open");
            });

            dropdown.addEventListener("click", function (event) {
                event.stopPropagation();
            });

            document.addEventListener("click", function () {
                dropdown.classList.remove("open");
            });
        }

        async function loadHeader() {
            const { data, error } = await supabaseClient.auth.getUser();
            const header = document.getElementById("header-right");

            if (error || !data.user) {
                header.innerHTML = `
                    <button class="header-btn" onclick="goLogin()">Connexion</button>
                    <button class="header-btn" onclick="goSignup()">Inscription</button>
                `;
                return;
            }

            const user = data.user;
            const pseudo = user.user_metadata?.pseudo || "Mon compte";
            const avatarUrl = user.user_metadata?.avatar_url || "images/default-avatar.png";
            const role = user.user_metadata?.role || "reader";

            header.innerHTML = `
                <button class="header-btn" onclick="goHome()">Accueil</button>

                <div class="profile-menu-wrapper">
                    <button
                        class="header-btn profile-btn profile-trigger"
                        id="profile-menu-trigger"
                        type="button"
                    >
                        <img src="${avatarUrl}" alt="Avatar" class="header-avatar">
                        <span>${pseudo}</span>
                    </button>

                    <div class="dropdown-menu" id="profile-dropdown">
                        <button class="dropdown-item" onclick="goDashboard()">Mon espace</button>
                        ${role === "writer" ? `<button class="dropdown-item" onclick="goWriterProfile()">Profil écrivain</button>` : ``}
                        <button class="dropdown-item" onclick="goSettings()">Paramètres</button>
                        <div class="dropdown-separator"></div>
                        <button class="dropdown-item" onclick="logout()">Déconnexion</button>
                    </div>
                </div>
            `;

            setupProfileDropdown();
        }

        loadHeader();
    </script>
</body>
</html>
