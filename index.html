<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lys Moi</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;

            background:
                linear-gradient(rgba(10, 10, 15, 0.65), rgba(10, 10, 15, 0.78)),
                url("images/background.png");
            background-size: cover;
            background-position: right center;
            background-repeat: no-repeat;

            color: #f5f1e8;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 760px;
            text-align: center;
            background: rgba(20, 20, 25, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 28px;
            padding: 52px 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-2px);
        }

        .top {
            font-size: 14px;
            letter-spacing: 3px;
            color: #c9b08a;
            margin-bottom: 18px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 3.2rem;
            line-height: 1.1;
            margin: 0 0 20px;
            color: #fff8ee;
        }

        .subtitle {
            font-size: 1.22rem;
            line-height: 1.6;
            color: #ddd3c4;
            margin: 0 auto 35px;
            max-width: 620px;
        }

        .highlight {
            color: #f0c674;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 26px;
            border-radius: 14px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
        }

        .primary {
            background: #f0c674;
            color: #1a1620;
            border: none;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(240, 198, 116, 0.25);
        }

        .secondary {
            background: transparent;
            color: #f5f1e8;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            opacity: 0.96;
        }

        .primary:hover {
            box-shadow: 0 15px 35px rgba(240, 198, 116, 0.4);
        }

        @media (max-width: 700px) {
            h1 {
                font-size: 2.3rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .container {
                padding: 38px 24px;
            }

            .buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top">Lys Moi</div>

        <h1>Laissez vos mots éclore ✍️</h1>

        <p class="subtitle">
            Un espace pour <span class="highlight">publier</span>,
            <span class="highlight">être lu</span>, et offrir une voix
            aux histoires qu’on ignore trop souvent.
        </p>

        <div class="buttons">
            <button class="primary" onclick="window.location.href='signup.html'">
                ✍️ Créer un compte
            </button>

            <button class="secondary" onclick="window.location.href='login.html'">
                🔐 Se connecter
            </button>
        </div>
    </div>

</body>
</html>
