<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Lys Moi</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background:
                linear-gradient(rgba(10, 10, 15, 0.65), rgba(10, 10, 15, 0.78)),
                url("images/background.png");
            background-size: cover;
            background-position: right center;
            background-repeat: no-repeat;
            color: #f5f1e8;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            padding-top: 110px;
        }

        .main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: rgba(20, 20, 25, 0.75);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1000;
        }

        .logo {
            font-size: 1.3rem;
            letter-spacing: 2px;
            color: #f0c674;
            cursor: pointer;
            font-weight: bold;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-btn {
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
            background: transparent;
            color: #f5f1e8;
            border: 1px solid rgba(255,255,255,0.25);
        }

        .header-btn:hover {
            transform: translateY(-2px);
            opacity: 0.96;
        }

        .profile-btn {
            background: rgba(20, 20, 25, 0.72);
            color: #f5f1e8;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .profile-with-avatar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            background: rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        .container {
            width: 100%;
            max-width: 720px;
            text-align: center;
            background: rgba(20, 20, 25, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 28px;
            padding: 50px 35px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        .top {
            font-size: 13px;
            letter-spacing: 3px;
            color: #c9b08a;
            margin-bottom: 18px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0 0 14px;
            color: #fff8ee;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #ddd3c4;
            margin-bottom: 30px;
        }

        .role-box {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .role-title {
            font-size: 0.95rem;
            color: #c9b08a;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .role-text {
            font-size: 1.2rem;
            color: #fff8ee;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
        }

        .primary {
            background: #f0c674;
            color: #1a1620;
            border: none;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(240, 198, 116, 0.25);
        }

        .secondary {
            background: transparent;
            color: #f5f1e8;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            opacity: 0.96;
        }

        .primary:hover {
            box-shadow: 0 15px 35px rgba(240, 198, 116, 0.4);
        }

        @media (max-width: 700px) {
            h1 {
                font-size: 2.2rem;
            }

            .buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            body {
                padding-top: 100px;
            }

            .main-header {
                padding: 0 15px;
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-left">
            <span class="logo" onclick="goHome()">Lys Moi</span>
        </div>
        <div class="header-right" id="header-right"></div>
    </header>

    <div class="container">
        <div class="top">Lys Moi</div>

        <h1 id="welcome-title">Bienvenue 🎉</h1>
        <p class="subtitle">Votre espace personnel sur Lys Moi.</p>

        <div class="role-box">
            <div class="role-title">Statut du compte</div>
            <div class="role-text" id="role-text">Chargement...</div>
        </div>

        <div class="buttons" id="dashboard-buttons">
            <!-- Injecté dynamiquement -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://infljnmssewkeayrvtwc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_YI-ATv9K4m3ftejOIZpnQQ_kn4mMdP9";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function goHome() {
            window.location.href = "index.html";
        }

        function goLogin() {
            window.location.href = "login.html";
        }

        function goSignup() {
            window.location.href = "signup.html";
        }

        function goDashboard() {
            window.location.href = "dashboard.html";
        }

        function goWriterProfile() {
            window.location.href = "writer-profile.html";
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        async function loadHeader() {
            const { data, error } = await supabaseClient.auth.getUser();
            const header = document.getElementById("header-right");

            if (error || !data.user) {
                header.innerHTML = `
                    <button class="header-btn" onclick="goLogin()">Connexion</button>
                    <button class="header-btn" onclick="goSignup()">Inscription</button>
                `;
                return;
            }

            const pseudo = data.user.user_metadata?.pseudo || "Mon compte";
            const avatarUrl = data.user.user_metadata?.avatar_url || "images/default-avatar.png";

            header.innerHTML = `
                <button class="header-btn" onclick="goHome()">Accueil</button>

                <button class="header-btn profile-btn profile-with-avatar" onclick="goDashboard()">
                    <img src="${avatarUrl}" alt="Avatar" class="header-avatar">
                    <span>${pseudo}</span>
                </button>

                <button class="header-btn" onclick="logout()">Déconnexion</button>
            `;
        }

        async function loadUser() {
            const { data, error } = await supabaseClient.auth.getUser();

            if (error || !data.user) {
                window.location.href = "login.html";
                return;
            }

            const user = data.user;
            const pseudo = user.user_metadata?.pseudo || "utilisateur";
            const role = user.user_metadata?.role || "reader";

            document.getElementById("welcome-title").textContent = `Bienvenue ${pseudo} 🎉`;

            if (role === "writer") {
                document.getElementById("role-text").textContent = "Connecté en tant qu’Écrivain ✍️";

                document.getElementById("dashboard-buttons").innerHTML = `
                    <button class="primary" onclick="goWriterProfile()">Mon profil écrivain</button>
                `;
            } else {
                document.getElementById("role-text").textContent = "Connecté en tant que Lecteur 👀";

                document.getElementById("dashboard-buttons").innerHTML = `
                    <button class="primary" onclick="goHome()">Explorer Lys Moi</button>
                `;
            }
        }

        loadHeader();
        loadUser();
    </script>

</body>
</html>
