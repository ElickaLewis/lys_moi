<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Lys Moi</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background:
                linear-gradient(rgba(10, 10, 15, 0.65), rgba(10, 10, 15, 0.78)),
                url("images/background.png");
            background-size: cover;
            background-position: right center;
            background-repeat: no-repeat;
            color: #f5f1e8;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            padding-top: 110px;
        }

        .main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: rgba(20, 20, 25, 0.75);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1000;
        }

        .logo {
            font-size: 1.3rem;
            letter-spacing: 2px;
            color: #f0c674;
            cursor: pointer;
            font-weight: bold;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-btn {
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
            background: transparent;
            color: #f5f1e8;
            border: 1px solid rgba(255,255,255,0.25);
        }

        .header-btn:hover {
            transform: translateY(-2px);
            opacity: 0.96;
        }

        .profile-btn {
            background: rgba(20, 20, 25, 0.72);
            color: #f5f1e8;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            background: rgba(20, 20, 25, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 45px 35px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        .top {
            font-size: 13px;
            letter-spacing: 3px;
            color: #c9b08a;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        h1 {
            margin-bottom: 25px;
            font-size: 2.5rem;
            color: #fff8ee;
        }

        .field {
            text-align: left;
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            color: #ddd3c4;
            font-size: 0.95rem;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            outline: none;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            box-shadow: 0 0 0 2px rgba(240, 198, 116, 0.4);
        }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 6px 0 18px;
            text-align: left;
            color: #ddd3c4;
            font-size: 0.95rem;
        }

        .remember-row input {
            margin: 0;
            transform: scale(1.1);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
        }

        .primary {
            background: #f0c674;
            color: #1a1620;
            border: none;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(240, 198, 116, 0.25);
        }

        .secondary {
            background: transparent;
            color: #f5f1e8;
            border: 1px solid rgba(255,255,255,0.3);
            margin-top: 15px;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .primary:hover {
            box-shadow: 0 15px 35px rgba(240, 198, 116, 0.35);
        }

        #message {
            margin-top: 15px;
            color: #f0c674;
            min-height: 24px;
        }

        @media (max-width: 700px) {
            body {
                padding-top: 100px;
            }

            .main-header {
                padding: 0 15px;
            }
        }
    </style>
</head>

<body>

    <header class="main-header">
        <div class="header-left">
            <span class="logo" onclick="goHome()">Lys Moi</span>
        </div>
        <div class="header-right" id="header-right"></div>
    </header>

    <div class="container">
        <div class="top">Lys Moi</div>

        <h1>Se connecter 🔐</h1>

        <form id="login-form">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Votre email" required>
            </div>

            <div class="field">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="Votre mot de passe" required>
            </div>

            <label class="remember-row" for="remember">
                <input type="checkbox" id="remember" checked>
                <span>Rester connecté</span>
            </label>

            <button class="primary" type="submit">
                Connexion
            </button>
        </form>

        <p id="message"></p>

        <button class="secondary" onclick="window.location.href='index.html'">
            ← Retour
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://infljnmssewkeayrvtwc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_YI-ATv9K4m3ftejOIZpnQQ_kn4mMdP9";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function goHome() {
            window.location.href = "index.html";
        }

        function goLogin() {
            window.location.href = "login.html";
        }

        function goSignup() {
            window.location.href = "signup.html";
        }

        function goDashboard() {
            window.location.href = "dashboard.html";
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        async function loadHeader() {
    const { data, error } = await supabaseClient.auth.getUser();
    const header = document.getElementById("header-right");

    if (error || !data.user) {
        header.innerHTML = ``;
        return;
    }

    const pseudo = data.user.user_metadata?.pseudo || "Mon compte";
    const avatarUrl = data.user.user_metadata?.avatar_url || "images/default-avatar.png";

    header.innerHTML = `
        <button class="header-btn profile-btn profile-with-avatar" onclick="goDashboard()">
            <img src="${avatarUrl}" alt="Avatar" class="header-avatar">
            <span>${pseudo}</span>
        </button>
        <button class="header-btn" onclick="logout()">Déconnexion</button>
    `;

    document.getElementById("main-buttons").innerHTML = `
        <button class="main-btn primary" onclick="window.location.href='dashboard.html'">
            Accéder à mon espace
        </button>
        <button class="main-btn secondary" onclick="logout()">
            Se déconnecter
        </button>
    `;
}

        const form = document.getElementById("login-form");
        const message = document.getElementById("message");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            message.textContent = "Connexion en cours...";

            const { error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                message.textContent = "Erreur : " + error.message;
                return;
            }

            message.textContent = "Connexion réussie 🎉";

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 700);
        });

        async function checkExistingSession() {
            const { data } = await supabaseClient.auth.getSession();

            if (data.session) {
                window.location.href = "dashboard.html";
            }
        }

        loadHeader();
        checkExistingSession();
    </script>

</body>
</html>
