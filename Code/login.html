<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Lys Moi</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>

    <header class="main-header">
        <span class="logo" onclick="goHome()">Lys Moi</span>
        <div class="header-right" id="header-right"></div>
    </header>

    <main class="auth-shell">
    <div class="auth-card">
        <div class="auth-topline">Lys Moi</div>
        <h1>Connexion</h1>

        <form id="login-form" class="auth-form">
            <div class="auth-field">
                <label for="email" class="auth-label">Email ou identifiant</label>
                <input
                    type="text"
                    id="email"
                    class="auth-input"
                    placeholder="Ton email ou ton identifiant"
                    required
                >
            </div>

            <div class="auth-field">
                <label for="password" class="auth-label">Mot de passe</label>
                <input
                    type="password"
                    id="password"
                    class="auth-input"
                    placeholder="Ton mot de passe"
                    required
                >
            </div>

            <div class="remember-box">
                <label class="remember-label" for="remember-me">
                    <input
                        type="checkbox"
                        id="remember-me"
                        class="remember-checkbox"
                        checked
                    >

                    <span class="remember-content">
                        <span class="remember-title">Se souvenir de moi</span>
                        <span class="remember-note" id="remember-note">
                        Garde la porte entrouverte sur ton jardin : en laissant cette option cochée,
                        ta session restera active même après avoir fermé le navigateur.
                        </span>
                    </span>
                </label>
            </div>

            <button type="submit" class="main-btn primary-btn">
                Se connecter
            </button>
        </form>

        <p class="auth-switch">
            Pas encore de compte ?
            <span onclick="goSignup()">Créer un compte</span>
        </p>

        <div id="login-feedback" class="auth-feedback"></div>
    </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/header.js"></script>
    <script src="js/pages/login.js"></script>
</body>
</html>
