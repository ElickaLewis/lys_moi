<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lys Moi</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background:
                linear-gradient(rgba(10, 10, 15, 0.65), rgba(10, 10, 15, 0.78)),
                url("images/background.png");
            background-size: cover;
            background-position: right center;
            background-repeat: no-repeat;
            color: #f5f1e8;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            padding-top: 110px;
        }

        .main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: rgba(20, 20, 25, 0.75);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1000;
        }

        .logo {
            font-size: 1.3rem;
            letter-spacing: 2px;
            color: #f0c674;
            cursor: pointer;
            font-weight: bold;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-btn {
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            cursor: pointer;
            background: transparent;
            color: #f5f1e8;
            border: 1px solid rgba(255,255,255,0.25);
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .header-btn:hover {
            transform: translateY(-2px);
            opacity: 0.96;
        }

        .profile-btn {
            background: rgba(20, 20, 25, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .profile-menu-wrapper {
            position: relative;
        }

        .profile-trigger {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            background: rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            min-width: 220px;
            background: rgba(20, 20, 25, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 16px;
            padding: 10px;
            backdrop-filter: blur(12px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
            display: none;
            z-index: 2000;
        }

        .dropdown-menu.open {
            display: block;
        }

        .dropdown-item {
            width: 100%;
            background: transparent;
            border: none;
            color: #f5f1e8;
            text-align: left;
            padding: 12px 14px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(2px);
        }

        .dropdown-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 8px 0;
        }

        .container {
            width: 100%;
            max-width: 760px;
            text-align: center;
            background: rgba(20, 20, 25, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 28px;
            padding: 52px 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-2px);
        }

        .top {
            font-size: 14px;
            letter-spacing: 3px;
            color: #c9b08a;
            margin-bottom: 18px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 3.2rem;
            line-height: 1.1;
            margin: 0 0 20px;
            color: #fff8ee;
        }

        .subtitle {
            font-size: 1.22rem;
            line-height: 1.6;
            color: #ddd3c4;
            margin: 0 auto 35px;
            max-width: 620px;
        }

        .highlight {
            color: #f0c674;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .main-btn {
            padding: 14px 26px;
            border-radius: 14px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
        }

        .primary {
            background: #f0c674;
            color: #1a1620;
            border: none;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(240, 198, 116, 0.25);
        }

        .secondary {
            background: transparent;
            color: #f5f1e8;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .main-btn:hover,
        .primary:hover,
        .secondary:hover {
            transform: translateY(-3px) scale(1.02);
            opacity: 0.96;
        }

        .primary:hover {
            box-shadow: 0 15px 35px rgba(240, 198, 116, 0.4);
        }

        @media (max-width: 700px) {
            body {
                padding-top: 100px;
            }

            h1 {
                font-size: 2.3rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .container {
                padding: 38px 24px;
            }

            .buttons {
                flex-direction: column;
            }

            .main-btn {
                width: 100%;
            }

            .main-header {
                padding: 0 15px;
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <span class="logo" onclick="goHome()">Lys Moi</span>
        <div class="header-right" id="header-right"></div>
    </header>

    <div class="container">
        <div class="top">Lys Moi</div>

        <h1>Laissez vos mots éclore ✍️</h1>

        <p class="subtitle">
            Un espace pour <span class="highlight">publier</span>,
            <span class="highlight">être lu</span>, et offrir une voix
            aux histoires qu’on ignore trop souvent.
        </p>

        <div class="buttons" id="main-buttons">
            <button class="main-btn primary" onclick="window.location.href='signup.html'">
                ✍️ Créer un compte
            </button>

            <button class="main-btn secondary" onclick="window.location.href='login.html'">
                🔐 Se connecter
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://infljnmssewkeayrvtwc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_YI-ATv9K4m3ftejOIZpnQQ_kn4mMdP9";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function goHome() {
            window.location.href = "index.html";
        }

        function goLogin() {
            window.location.href = "login.html";
        }

        function goSignup() {
            window.location.href = "signup.html";
        }

        function goDashboard() {
            window.location.href = "dashboard.html";
        }

        function goWriterProfile() {
            window.location.href = "writer-profile.html";
        }

        function goSettings() {
            window.location.href = "settings.html";
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        function setupProfileDropdown() {
            const trigger = document.getElementById("profile-menu-trigger");
            const dropdown = document.getElementById("profile-dropdown");

            if (!trigger || !dropdown) return;

            trigger.addEventListener("click", function (event) {
                event.stopPropagation();
                dropdown.classList.toggle("open");
            });

            dropdown.addEventListener("click", function (event) {
                event.stopPropagation();
            });

            document.addEventListener("click", function () {
                dropdown.classList.remove("open");
            });
        }

        async function loadHeader() {
            const { data, error } = await supabaseClient.auth.getUser();
            const header = document.getElementById("header-right");

            if (error || !data.user) {
                header.innerHTML = ``;
                return;
            }

            const user = data.user;
            const pseudo = user.user_metadata?.pseudo || "Mon compte";
            const avatarUrl = user.user_metadata?.avatar_url || "images/default-avatar.png";
            const role = user.user_metadata?.role || "reader";

            header.innerHTML = `
                <div class="profile-menu-wrapper">
                    <button
                        class="header-btn profile-btn profile-trigger"
                        id="profile-menu-trigger"
                        type="button"
                    >
                        <img src="${avatarUrl}" alt="Avatar" class="header-avatar">
                        <span>${pseudo}</span>
                    </button>

                    <div class="dropdown-menu" id="profile-dropdown">
                        <button class="dropdown-item" onclick="goDashboard()">Mon espace</button>
                        ${role === "writer" ? `<button class="dropdown-item" onclick="goWriterProfile()">Profil écrivain</button>` : ``}
                        <button class="dropdown-item" onclick="goSettings()">Paramètres</button>
                        <div class="dropdown-separator"></div>
                        <button class="dropdown-item" onclick="logout()">Déconnexion</button>
                    </div>
                </div>
            `;

            document.getElementById("main-buttons").innerHTML = `
                <button class="main-btn primary" onclick="window.location.href='dashboard.html'">
                    Accéder à mon espace
                </button>
            `;

            setupProfileDropdown();
        }

        loadHeader();
    </script>
</body>
</html>
